<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/x-icon" href="/src/assets/masteredlogo-ico.ico"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
    <meta name="referrer" content="strict-origin-when-cross-origin"/>
    <meta name="theme-color" content="#0f172a"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="LMS"/>
    <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png"/>
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png"/>
    <title>LMS Platform</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const RECOVERY_KEY = 'lms_sw_recovery_attempted'

        const handleAssetLoadFailure = function (event) {
          const target = event && event.target
          const source = target && target.src ? String(target.src) : ''
          if (!source || source.indexOf('/assets/index-') === -1) return
          if (sessionStorage.getItem(RECOVERY_KEY) === '1') return

          sessionStorage.setItem(RECOVERY_KEY, '1')

          const recoverAndReload = async function () {
            try {
              if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations()
                await Promise.all(registrations.map((registration) => registration.unregister()))
              }
              if ('caches' in window) {
                const cacheKeys = await caches.keys()
                await Promise.all(cacheKeys.map((key) => caches.delete(key)))
              }
            } catch (error) {
              console.error('Failed to recover from stale service worker cache:', error)
            } finally {
              const nextUrl = new URL(window.location.href)
              nextUrl.searchParams.set('sw-recovered', Date.now().toString())
              window.location.replace(nextUrl.toString())
            }
          }

          recoverAndReload()
        }

        window.addEventListener('error', handleAssetLoadFailure, true)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
